<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Regression</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Linear Regression Using Least Square Method</h1>

    <label>Enter X Values</label>
    <input type="text" placeholder="Example: 1,2,3,4">

    <label>Enter Y Values</label>
    <input type="text" placeholder="Example: 2,4,6,8">

    <div class="buttons">
        <button>Submit</button>
        <button>Regression Line</button>
        <button>Visualization</button>
        <button type="reset">Reset</button>
    </div>

    <div class="result">
        <h2>Output</h2>

        <p><b>Regression Equation :</b> ______________________</p>

        <p><b>MAE :</b> ______________________</p>

        <p><b>MSE :</b> ______________________</p>

        <p><b>R² Score :</b> ______________________</p>

        <p><b>Interpretation :</b> ______________________</p>
    </div>

</div>

</body>
</html>
